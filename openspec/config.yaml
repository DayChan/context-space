schema: spec-driven

context: |
  本项目的 OpenSpec 文档以及后续生成的所有 OpenSpec 产物必须使用简体中文。
  技术名词、代码标识符、路径、命令和产品界面名称可以保留英文。
  为兼容 OpenSpec 解析与校验，解析器要求的固定结构标记必须保留英文原文，
  包括 `## Why`、`## What Changes`、需求增量标题、`Requirement`、`Scenario`、
  `SHALL`、`MUST`、`WHEN`、`THEN` 和 `AND`；除这些固定标记外均使用中文。

rules:
  proposal:
    - 除 OpenSpec 固定结构标题外，所有标题、正文和列表必须使用简体中文。
  specs:
    - 需求名称、场景名称和描述必须使用简体中文，仅保留解析器要求的固定英文标记。
  design:
    - 所有标题、决策、风险、迁移说明和开放问题必须使用简体中文。
  tasks:
    - 所有分组标题和任务描述必须使用简体中文，并保留可解析的复选框及编号格式。
